databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio_db
    user: portfolio_user

services:
  - type: web
    name: portfolio-backend
    env: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: FRONTEND_URL
        value: "https://Ibrahima-Camara20.github.io"
